# ============================================================
# 开发环境配置（无需Redis）
# ============================================================

server:
  port: 8081
  servlet:
    context-path: /

spring:
  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/smart_exam?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:}

# 通义千问AI配置
ali:
  qwen:
    api-key: ${QWEN_API_KEY:}
    base-url: https://dashscope.aliyuncs.com/api/v1
    model: qwen3.6-flash-2026-04-16
    timeout: 15000
    max-retries: 2

# 文件上传配置
file:
  upload:
    path: ./uploads
    max-size: 10MB
    allowed-types: xlsx,xls

# 草稿配置（改用数据库存储）
draft:
  prefix: "exam:draft:"
  ttl: 86400

# Sa-Token配置（内存模式）
sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 86400
  active-timeout: 7200
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false

# 日志配置
logging:
  level:
    com.smartexam: debug
    org.springframework.web: debug
